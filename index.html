<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ORACLE v17.9 - HARMONY</title>
    
    <!-- PWA & iOS Support -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#D4AF37">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Oracle">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1684/1684426.png">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Cinzel:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <!-- External Scripts (served from public/) -->
    <script src="/config.js"></script>
    <script src="/deck.js"></script>
    <script src="/audioManager.js"></script>
    <script src="/manageraudio.js"></script>
    <script src="/messageParser.js"></script>

    <style>
        :root { 
            --gold: #D4AF37; 
            --void: #050508; 
        }
        
        body {
            background-color: var(--void);
            color: #f0f0f0;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 3px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(212, 175, 55, 0.2);
            border-radius: 10px;
        }

        #loader {
            position: fixed;
            inset: 0;
            background: url('https://images.unsplash.com/photo-1534796636912-3b95b3ab5986?q=80&w=2072&auto=format&fit=crop') no-repeat center center/cover;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.8s ease-out;
        }

        #loader::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(5, 5, 8, 0.7);
            backdrop-filter: blur(3px);
        }

        .loader-content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
        }

        .constellation-spinner {
            position: relative;
            width: 120px;
            height: 120px;
        }

        .orbit {
            position: absolute;
            inset: 0;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: spin 8s linear infinite;
        }

        .orbit::after {
            content: '';
            position: absolute;
            top: -3px;
            left: 50%;
            transform: translateX(-50%);
            width: 6px;
            height: 6px;
            background: var(--gold);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--gold);
        }

        .orbit:nth-child(2) {
            inset: 20px;
            border-color: rgba(212, 175, 55, 0.2);
            animation-duration: 6s;
            animation-direction: reverse;
        }

        .orbit:nth-child(3) {
            inset: 40px;
            border-color: rgba(255, 255, 255, 0.05);
            animation-duration: 4s;
        }

        .center-symbol {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gold);
            font-size: 2rem;
            animation: pulse 3s ease-in-out infinite;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { opacity: 0.6; transform: scale(0.95); } 50% { opacity: 1; transform: scale(1.05); } }
    </style>
</head>
<body>
    <div id="loader">
        <div class="loader-content">
            <div class="constellation-spinner">
                <div class="orbit"></div>
                <div class="orbit"></div>
                <div class="orbit"></div>
                <div class="center-symbol">♐</div>
            </div>
            <div class="font-header text-gold text-sm tracking-[8px] uppercase opacity-80" style="font-family: 'Cinzel', serif;">Connecting to Ether</div>
        </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
</body>
</html>
