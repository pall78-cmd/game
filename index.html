<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ORACLE v17.9 - HARMONY</title>
    
    <!-- PWA & iOS Support -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#D4AF37">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Oracle">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1684/1684426.png">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Cinzel:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <!-- External Scripts (served from public/) -->
    <script src="/config.js"></script>
    <script src="/deck.js"></script>
    <script src="/audioManager.js"></script>
    <script src="/manageraudio.js"></script>
    <script src="/messageParser.js"></script>
    <script src="/connectionManager.js"></script>

    <style>
        :root { 
            --gold: #D4AF37; 
            --void: #050508; 
        }
        
        body {
            background-color: var(--void);
            color: #f0f0f0;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 3px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(212, 175, 55, 0.2);
            border-radius: 10px;
        }

        #loader {
            position: fixed;
            inset: 0;
            background: black;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease-out;
            gap: 2rem;
        }

        @keyframes shimmer {
            0% { left: -50%; }
            100% { left: 100%; }
        }

        .animate-shimmer {
            animation: shimmer 2s infinite;
        }
    </style>
</head>
<body>
    <div id="loader">
        <div class="font-header text-gold text-lg tracking-[12px] animate-pulse" style="font-family: 'Cinzel', serif;">ORACLE AWAKENING</div>
        <div class="w-64 h-[2px] bg-white/5 relative overflow-hidden" style="width: 16rem; height: 2px;">
            <div class="absolute inset-0 bg-gold/40 animate-shimmer" style="position: absolute; inset: 0; background-color: rgba(212, 175, 55, 0.4); width: 50%; left: -50%;"></div>
        </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
</body>
</html>
