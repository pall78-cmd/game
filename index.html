<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ORACLE v17.9 - HARMONY</title>
    
    <!-- PWA & iOS Support -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#D4AF37">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Oracle">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1684/1684426.png">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Cinzel:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <!-- External Scripts (served from public/) -->

    <style>
        :root { 
            --gold: #D4AF37; 
            --void: #050508; 
        }
        
        body {
            background-color: var(--void);
            color: #f0f0f0;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 3px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(212, 175, 55, 0.2);
            border-radius: 10px;
        }

        #loader {
            position: fixed;
            inset: 0;
            background: url('https://images.unsplash.com/photo-1534796636912-3b95b3ab5986?q=80&w=2072&auto=format&fit=crop') no-repeat center center/cover;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.8s ease-out;
        }

        #loader::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(5, 5, 8, 0.7);
            backdrop-filter: blur(3px);
        }

        .loader-content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
        }

        .constellation-spinner {
            position: relative;
            width: 120px;
            height: 120px;
        }

        .orbit {
            position: absolute;
            inset: 0;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: spin 8s linear infinite;
        }

        .orbit::after {
            content: '';
            position: absolute;
            top: -3px;
            left: 50%;
            transform: translateX(-50%);
            width: 6px;
            height: 6px;
            background: var(--gold);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--gold);
        }

        .orbit:nth-child(2) {
            inset: 20px;
            border-color: rgba(212, 175, 55, 0.2);
            animation-duration: 6s;
            animation-direction: reverse;
        }

        .orbit:nth-child(3) {
            inset: 40px;
            border-color: rgba(255, 255, 255, 0.05);
            animation-duration: 4s;
        }

        .constellation {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 80px;
            height: 80px;
            transform: translate(-50%, -50%);
        }

        .star {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--gold);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--gold);
            animation: twinkle 3s infinite ease-in-out;
        }

        .line {
            position: absolute;
            background: rgba(212, 175, 55, 0.3);
            height: 1px;
            transform-origin: left center;
        }

        /* Sagittarius Shape (Teapot) */
        .s1 { top: 20%; left: 40%; } /* Top of lid */
        .s2 { top: 35%; left: 30%; } /* Spout tip */
        .s3 { top: 45%; left: 50%; } /* Lid base */
        .s4 { top: 45%; left: 70%; } /* Handle top */
        .s5 { top: 65%; left: 40%; } /* Body left */
        .s6 { top: 65%; left: 60%; } /* Body right */
        .s7 { top: 80%; left: 30%; } /* Spout base */
        .s8 { top: 80%; left: 80%; } /* Handle base */

        /* Connecting Lines */
        .l1 { top: 20%; left: 40%; width: 22px; transform: rotate(115deg); } /* s1 -> s2 */
        .l2 { top: 20%; left: 40%; width: 15px; transform: rotate(65deg); } /* s1 -> s3 */
        .l3 { top: 35%; left: 30%; width: 28px; transform: rotate(25deg); } /* s2 -> s3 */
        .l4 { top: 45%; left: 50%; width: 20px; transform: rotate(0deg); } /* s3 -> s4 */
        .l5 { top: 45%; left: 50%; width: 22px; transform: rotate(115deg); } /* s3 -> s5 */
        .l6 { top: 45%; left: 70%; width: 22px; transform: rotate(65deg); } /* s4 -> s6 */
        .l7 { top: 65%; left: 40%; width: 20px; transform: rotate(0deg); } /* s5 -> s6 */
        .l8 { top: 65%; left: 40%; width: 22px; transform: rotate(135deg); } /* s5 -> s7 */
        .l9 { top: 65%; left: 60%; width: 28px; transform: rotate(45deg); } /* s6 -> s8 */
        .l10 { top: 45%; left: 70%; width: 25px; transform: rotate(65deg); } /* s4 -> s8 (handle) */

        @keyframes twinkle { 0%, 100% { opacity: 0.4; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.2); } }
    </style>
</head>
<body>
    <div id="loader">
        <div class="loader-content">
            <div class="constellation-spinner">
                <div class="orbit"></div>
                <div class="orbit"></div>
                <div class="orbit"></div>
                <div class="constellation">
                    <!-- Stars -->
                    <div class="star s1" style="animation-delay: 0s"></div>
                    <div class="star s2" style="animation-delay: 0.5s"></div>
                    <div class="star s3" style="animation-delay: 1s"></div>
                    <div class="star s4" style="animation-delay: 1.5s"></div>
                    <div class="star s5" style="animation-delay: 0.2s"></div>
                    <div class="star s6" style="animation-delay: 0.7s"></div>
                    <div class="star s7" style="animation-delay: 1.2s"></div>
                    <div class="star s8" style="animation-delay: 1.7s"></div>
                    
                    <!-- Lines -->
                    <div class="line l1"></div>
                    <div class="line l2"></div>
                    <div class="line l3"></div>
                    <div class="line l4"></div>
                    <div class="line l5"></div>
                    <div class="line l6"></div>
                    <div class="line l7"></div>
                    <div class="line l8"></div>
                    <div class="line l9"></div>
                </div>
            </div>
            <div class="font-header text-gold text-sm tracking-[8px] uppercase opacity-80" style="font-family: 'Cinzel', serif;">Connecting to Ether</div>
        </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
</body>
</html>
